{% extends '00_base.html' %}
{% block body %}
<div class="auth-shell">
  <section class="panel auth-panel">
    <div class="panel-head panel-head-default">
      <div class="panel-head-title-wrap"><div class="panel-head-title">비밀번호재설정</div></div>
      <div class="panel-head-actions"></div>
    </div>
    <div class="panel-body">
      <form class="form-stack">
        <div class="field"><label for="reset-email">이메일</label><input id="reset-email" type="email"></div>
        <button type="button" class="btn-primary" disabled>재설정 메일 발송(준비중)</button>
      </form>
      <p class="helper-row"><a href="{{ url_for('login') }}">로그인으로 돌아가기</a></p>
    </div>
  </section>
</div>
{% endblock %}
