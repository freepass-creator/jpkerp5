{% extends '00_base.html' %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/02_signup.css') }}">{% endblock %}
{% block body %}
<div class="auth-shell">
  <section class="panel auth-panel wide">
    <div class="panel-head panel-head-default">
      <div class="panel-head-title-wrap">
        <div class="panel-head-title">계정만들기</div>
      </div>
      <div class="panel-head-actions"></div>
    </div>
    <div class="panel-body">
      <form id="signup-form" class="form-stack">
        <div class="field"><label for="business_number">소속 사업자등록번호*</label><input id="business_number" name="business_number" required></div>
        <div class="helper-row" id="partner-preview">사업자등록번호를 입력하면 소속 매칭 결과가 표시됩니다.</div>
        <div class="field"><label for="email">이메일*</label><input id="email" name="email" type="email" required></div>
        <div class="field"><label for="password">비밀번호*</label><input id="password" name="password" type="password" required></div>
        <div class="field"><label for="password_confirm">비밀번호 확인*</label><input id="password_confirm" name="password_confirm" type="password" required></div>
        <div class="field"><label for="name">이름</label><input id="name" name="name"></div>
        <div class="field"><label for="position">직급</label><input id="position" name="position"></div>
        <div class="field"><label for="phone">연락처</label><input id="phone" name="phone"></div>
        <button type="submit" class="btn-primary">계정만들기</button>
      </form>
      <p class="helper-row">가입 후 기본 상태는 대기이며, 관리자가 회원유형·소속코드·상태를 확정합니다.</p>
      <p class="helper-row">이미 계정이 있으면 <a href="{{ url_for('login') }}">로그인</a></p>
      <p id="signup-message" class="message"></p>
    </div>
  </section>
</div>
{% endblock %}
{% block page_js %}<script type="module" src="{{ url_for('static', filename='js/pages/02_signup.js') }}"></script>{% endblock %}
