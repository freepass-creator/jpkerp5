{% extends '00_base.html' %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/12_settlement.css') }}">{% endblock %}
{% block body %}
<div class="dashboard-shell">
  <aside class="sidebar">
    <div class="sidebar-head">FREEPASS ERP</div>
    <nav id="sidebar-menu" class="sidebar-menu"></nav>
  </aside>
  <main class="main-shell">
    <div class="page-header">
      <div class="page-title">12 정산관리</div>
      <div class="page-header-actions"><button type="button" class="btn-filter" id="openSettlementFilterBtn">필터</button></div>
    </div>
    <div class="work-page grid-12 min-h-work management-skeleton">
      <section class="panel col-6">
        <div class="panel-head panel-head-default">
          <div class="panel-head-title-wrap"><div class="panel-head-title">정산목록</div></div>
          <div class="panel-head-actions"><button type="button" class="inline-button" id="settlement-form-reset">신규</button></div>
        </div>
        <div class="panel-body no-pad">
          <div id="settlement-list" class="summary-list admin-summary-list">
            <button type="button" class="summary-row admin-summary-row management-summary-row" data-mock-item="true" data-mock-code="ST001">
              <span class="summary-inline summary-inline-strong">ST001</span>
              <span class="summary-inline">샘플 정산</span>
              <span class="summary-inline">대기</span>
            </button>
          </div>
        </div>
      </section>
      <section class="panel col-6">
        <div class="panel-head panel-head-default">
          <div class="panel-head-title-wrap"><div class="panel-head-title">정산 정보</div></div>
          <div class="panel-head-actions">
            <button type="button" id="settlement-submit-head" class="inline-button">저장</button>
            <button type="button" id="settlement-delete-head" class="inline-button btn-danger">삭제</button>
          </div>
        </div>
        <div class="panel-body">
          <form id="settlement-form" class="form-grid">
            <input id="settlement-form_mode" type="hidden" value="create">
            <div class="field"><label for="settlement_code">정산코드</label><input id="settlement_code" data-auto-code readonly placeholder="자동 배정"></div>
            <div class="field"><label for="settlement_status">상태</label><input id="settlement_status" placeholder="예: 대기"></div>
            <div class="field full"><label for="settlement_title">정산명</label><input id="settlement_title" placeholder="정산명 입력"></div>
            <div class="field full"><label for="settlement_note">메모</label><textarea id="settlement_note" placeholder="정산 관련 내용을 입력합니다."></textarea></div>
          </form>
          <p id="settlement-message" class="message"></p>
        </div>
      </section>

      <aside class="filter-overlay panel" id="settlementFilterOverlay" aria-hidden="true">
        <div class="panel-head panel-head-default">
          <div class="panel-head-title-wrap"><div class="panel-head-title">필터</div></div>
          <div class="panel-head-actions"><button type="button" class="inline-button" data-filter-reset>초기화</button></div>
        </div>
        <div class="panel-body">
          <div class="empty-block">필터 영역</div>
        </div>
      </aside>
    </div>
  </main>
</div>
{% endblock %}
{% block page_js %}<script type="module" src="{{ url_for('static', filename='js/pages/12_settlement.js') }}"></script>{% endblock %}
