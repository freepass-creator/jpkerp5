{% extends '00_base.html' %}
{% block page_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/01_login.css') }}">{% endblock %}
{% block body %}
<div class="auth-shell">
  <section class="panel auth-panel">
    <div class="panel-head panel-head-default">
      <div class="panel-head-title-wrap">
        <div class="panel-head-title">로그인</div>
      </div>
      <div class="panel-head-actions"></div>
    </div>
    <div class="panel-body">
      <form id="login-form" class="form-stack">
        <div class="field">
          <label for="login-email">이메일</label>
          <input id="login-email" name="email" type="email" required>
        </div>
        <div class="field">
          <label for="login-password">비밀번호</label>
          <input id="login-password" name="password" type="password" required>
        </div>
        <button type="submit" class="btn-primary">로그인</button>
      </form>
      <div class="helper-row" style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <a href="{{ url_for('signup') }}">계정만들기</a>
        <span>·</span>
        <a href="{{ url_for('reset_password') }}">비밀번호재설정</a>
      </div>
      <p id="login-message" class="message"></p>
    </div>
  </section>
</div>
{% endblock %}
{% block page_js %}<script type="module" src="{{ url_for('static', filename='js/pages/01_login.js') }}"></script>{% endblock %}
